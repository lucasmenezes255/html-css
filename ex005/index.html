<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emojis</title>
</head>
<body>
    <h1>Colocando emojis</h1>
    <hr>
    <p>
        Para colocar emojis, é como se coloca símbolos:<br>
        - & acompanhado de #x e o código hexadecimal do emoji. 
    </p>
    <p>
        Exemplo: <br>
        desktop computer - &#x1F5A5<br>
        coração - &#x1F49A
    </p>
</body>
</html>
