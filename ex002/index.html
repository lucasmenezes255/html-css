<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos e quebras de linha</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>
        Para criar um parágrafo, usa-se o par de tags &lt;p&gt; e &lt;/p&gt;
    </p>
    <p>
        Para quebrar uma linha dessa forma <br> usa-se a tag &lt;br&gt; onde quer
        quebrar a linha
    </p>
    <h1>Símbolos e Emojis</h1>
    <p>
        Alguns símbolos são esses:
        &copy;
        &reg;
        &trade;
        &pound;
        &yen;
        &uarr;
        &dollar;
        &easter;
        <br>
        Emojis são feitos dessa forma: &#x(código Hexadecimal do emoji)
        &#x1F61C;
        &#x1FA75;
    </p>
</body>
</html>
